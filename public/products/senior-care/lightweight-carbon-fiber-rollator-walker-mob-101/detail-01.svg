  <text x="92" y="224" fill="#172B49" font-size="78" font-family="Georgia, 'Times New Roman', serif" font-weight="700">Fold. Walk. Rest.</text>
  <text x="92" y="290" fill="#475569" font-size="30" font-family="Arial, Helvetica, sans-serif">
