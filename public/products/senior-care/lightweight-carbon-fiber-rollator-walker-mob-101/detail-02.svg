  <rect x="136" y="640" width="284" height="44" rx="22" fill="#FFFFFF" fill-opacity="0.12"/>
  <text x="168" y="669" fill="#FFFFFF" font-size="22" font-family="Arial, Helvetica, sans-serif" font-weight="700">Brake handles support walking and parking</text>
  <rect x="136" y="716" width="284" height="44" rx="22" fill="#FFFFFF" fill-opacity="0.12"/>
  <text x="168" y="745" fill="#FFFFFF" font-size="22" font-family="Arial, Helvetica, sans-serif" font-weight="700">Seat + back support for short daily rests</text>

